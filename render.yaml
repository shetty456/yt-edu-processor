services:
  - type: web
    name: yt-edu-processor
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
